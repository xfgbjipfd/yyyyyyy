<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skypost | جاري التحميل</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="style.css">
    <style>
        /* تنسيق سريع في حال عدم وجوده في ملف CSS */
        body {
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: sans-serif;
            color: white;
        }
        .loading-container {
            text-align: center;
            width: 80%;
            max-width: 400px;
        }
        .brand-name {
            font-size: 2.5rem;
            letter-spacing: 5px;
            margin-bottom: 30px;
            font-weight: bold;
            color: #00bfff; /* لون سماوي */
        }
        .progress-container {
            width: 100%;
            height: 6px;
            background: #222;
            border-radius: 10px;
            overflow: hidden;
            position: relative;
        }
        .progress-bar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #00bfff, #0077ff);
            box-shadow: 0 0 15px #00bfff;
            transition: width 0.1s linear;
        }
        #status {
            margin-top: 15px;
            font-size: 0.9rem;
            opacity: 0.7;
        }
    </style>
</head>
<body>

    <div class="loading-container">
        <h2 class="brand-name">SKYPOST</h2>
        
        <div class="progress-container">
            <div id="progress-bar" class="progress-bar"></div>
        </div>

        <p id="status">جاري تهيئة المنصة...</p>
    </div>

    <script src="main.js"></script>
    
</body>
</html>

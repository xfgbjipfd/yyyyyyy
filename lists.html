    <style>
        .categories-list-vertical {
            display: flex;
            flex-direction: column;
            padding: 0 10px;
            background: transparent;
        }

        .category-row-card {
            display: flex;
            align-items: center;
            padding: 15px 5px;
            cursor: pointer;
            transition: 0.2s;
            text-decoration: none;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        .category-row-card:last-child {
            border-bottom: none;
        }

        .category-row-card:active {
            background: rgba(255, 255, 255, 0.03);
        }

        .category-icon-box {
            width: 45px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-left: 15px;
        }

        .category-icon-box img {
            width: 100%;
            height: 100%;
            border-radius: 10px;
            object-fit: cover;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .category-info {
            flex-grow: 1;
        }

        .category-info h3 {
            font-size: 15px;
            font-weight: 700;
            color: #fff;
            margin: 0;
            font-family: 'Cairo', sans-serif;
        }

        .category-info p {
            font-size: 11px;
            color: #777;
            margin: 3px 0 0 0;
        }

        .arrow-indicator {
            color: rgba(255, 255, 255, 0.15);
            font-size: 12px;
            margin-right: 10px;
        }

        .item-price-tag {
            color: #00bfff;
            font-weight: 800;
            font-size: 13px;
            background: rgba(0, 191, 255, 0.1);
            padding: 2px 8px;
            border-radius: 6px;
        }

        .category-header {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 20px 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            margin-bottom: 10px;
        }
    </style>
</head>
<body oncontextmenu="return false;">

                <div>

                    <p style="color: #666; font-size: 11px; margin-top: 2px;">اختر الخدمة المناسبة لك</p>
                </div>
            </div>

            <div class="categories-list-vertical" id="itemsList"></div>

            <div style="margin-top: 40px; display: flex; justify-content: center; padding-bottom: 60px;">

                    <i class="fas fa-arrow-right"></i> العودة للرئيسية
                </a>
            </div>
        </main>

        function renderServices() {
            itemsList.innerHTML = ''; 
            let found = false;

            allServices.forEach(service => {
                if (!category || category === service.cat) {
                    const card = document.createElement('div');
                    card.className = 'category-row-card';
                    
                    card.innerHTML = `
                        <div class="category-icon-box">
                            <img src="${service.img}" alt="${service.title}">
                        </div>
                        <div class="category-info">
                            <h3>${service.title}</h3>
                            <p>${service.desc}</p>
                        </div>
                        <div class="item-price-tag">${service.price}</div>
                        <div class="arrow-indicator">
                            <i class="fas fa-chevron-left"></i>
                        </div>
                    `;
                    
                    // وظيفة التوجيه المعدلة لإرسال البيانات المطلوبة لملف games.js[cite: 2, 3]
                    card.onclick = () => {
                        const targetFile = catConfig[service.cat] ? catConfig[service.cat].file : 'Games.html';
                        
                        // بناء بارامترات الرابط[cite: 2, 3]
                        const params = new URLSearchParams();
                        params.append('name', service.title);
                        params.append('img', service.img);
                        params.append('game', service.key || 'default');

                        window.location.href = `${targetFile}?${params.toString()}`;
                    };

                    itemsList.appendChild(card);
                    found = true;
                }
            });

            if (!found) {
                itemsList.innerHTML = "<p style='color:#777; text-align:center; padding: 40px;'>لا توجد خدمات في هذا القسم حالياً.</p>";
            }
            
            updateHeader(category);
        }

        function updateHeader(cat) {
            const catNameElement = document.getElementById('catName');
            const catIconElement = document.getElementById('catIcon');
            if (cat && catConfig[cat]) {
                catNameElement.innerText = catConfig[cat].name;
                catIconElement.className = `fas ${catConfig[cat].icon}`;
            } else {
                catNameElement.innerText = "كافة الخدمات";
                catIconElement.className = "fas fa-list-ul";
            }
        }

        renderServices();
